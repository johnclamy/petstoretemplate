{% extends "base.html" %}


{% block content %}
    <main>
        <section class="hero">
            <header>
                <h1>Hi, I'm {{ user.username }}</h1>
            </header>
        </section>
        <ul>
            {% for post in posts %}
            <li>
                <p><strong>{{ post.author.username }}</strong> posted: {{ post.body }}</p>
            </li>
            {% endfor %}
        </ul>
    </main>
{% endblock %}
